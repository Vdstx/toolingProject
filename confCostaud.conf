dest custom_block {
    domainlist custom_block/domains
}

# Les ACL
acl {

    wsus {
        pass wsus_allowed none
        redirect http://127.0.0.1/access-denied.html
    }

    eset {
        pass eset_allowed none
        redirect http://127.0.0.1/access-denied.html
    }

    siem {
        pass siem_allowed none
        redirect http://127.0.0.1/access-denied.html
    }

    lan {
        pass !custom_block !adult !porn !mixed_adult !sexual_education !lingerie !manga !malware !phishing !hacking !cryptojacking !dangerous_material !stalkerware !ddos !urlhaus !vpn !proxy !residential_proxies !strict_redirector !strong_redirector !redirector !translation !warez !tricheur !tricheur_pix !drugs !drogue !gambling !sect !violence !agressif !aggressive !social_networks !games !audio_video !shopping !dating !blog !radio !dynamic_dns !filehosting !webhosting !shortener !fakenews !publicite !marketingware none
        redirect http://127.0.0.1/access-denied.html
    }

    default {
        pass none
        redirect http://127.0.0.1/access-denied.html
    }
}
