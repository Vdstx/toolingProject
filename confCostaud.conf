dbhome /var/lib/squidguard/db
logdir /var/log/squidguard

# Sources
src lan {
    ip 172.16.0.0/12
}

src wsus {
    ip 172.16.6.82/32
}

src eset {
    ip 172.16.6.34/32
}

src siem {
    ip 172.16.6.18/32
}

# La whitelist
dest wsus_allowed {
    domainlist wsus_domains/domains
}

dest eset_allowed {
    domainlist eset_domains/domains
}

dest siem_allowed {
    domainlist siem_domains/domains
}

# Contenu bloqué
dest adult {
    domainlist blacklists/adult/domains
    urllist blacklists/adult/urls
}

dest porn {
    domainlist blacklists/porn/domains
    urllist blacklists/porn/urls
}

